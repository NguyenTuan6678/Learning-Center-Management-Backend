server:
  port: 8080

spring:
  application:
    name: TanKhoaLearningCenterBE
  config:
    import: optional:classpath:application-local.yml
  main:
    allow-bean-definition-overriding: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/LearningCenter}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  health:
    defaults:
      enabled: false
  endpoints:
    enabled-by-default: false
    health:
      enabled: false
    web:
      exposure:
        include: [ ]
      cors:
        allowed-origins: ${CORS_ORIGINS:*}
        allowed-methods: ${CORS_METHODS:*}
        allowed-headers: ${CORS_HEADERS:*}
        allow-credentials: ${CORS_CREDENTIALS:false}
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
    health:
      enabled: true
      probes:
        enabled: true
    info:
      enabled: false
  tracing:
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:default_secret_key_please_change_in_production_1234567890}
      expiration: 86400000 # a day
      refresh-token:
        expiration: 604800000 # 7 days

vnpay:
  return-url: http://localhost:8080/api/payments/vnpay/callback
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  tmn-code: ${VNPAY_TMN_CODE:default_tmn_code}
  secret-key: ${VNPAY_SECRET_KEY:default_secret_key}
  version: 2.1.0
  command: pay
  ordertype: other