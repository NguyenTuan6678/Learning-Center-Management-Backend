server:
  port: 8080

spring:
  application:
    name: TanKhoaLearningCenterBE
  main:
    allow-bean-definition-overriding: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://mongotut:mongo123@cluster0.pt6sdhn.mongodb.net/LearningCenter?appName=Cluster0}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  health:
    defaults:
      enabled: false
  endpoints:
    enabled-by-default: false
    health:
      enabled: false
    web:
      exposure:
        include: [ ]
      cors:
        allowed-origins: ${CORS_ORIGINS:*}
        allowed-methods: ${CORS_METHODS:*}
        allowed-headers: ${CORS_HEADERS:*}
        allow-credentials: ${CORS_CREDENTIALS:false}
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
    health:
      enabled: true
      probes:
        enabled: true
    info:
      enabled: false
  tracing:
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:6e5f9db3f11f7585ceaeb35550270e36ffd731f3961600dc349a92415cfdfdc7}
      expiration: 86400000 # a day
      refresh-token:
        expiration: 604800000 # 7 days

vnpay:
  return-url: http://localhost:8080/api/payments/vnpay/callback
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  tmn-code: ${VNPAY_TMN_CODE:IQC0KY3H}
  secret-key: ${VNPAY_SECRET_KEY:W2WAAITEJZAXPK7LBTKEUXDXIUXF36LG}
  version: 2.1.0
  command: pay
  ordertype: other